<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNY STORE</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5;}
header { background:#222; color:#fff; padding:15px; text-align:center;}
.container { padding:15px;}
.product { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px;}
button {
  background:#25D366; color:white; border:none;
  padding:10px; border-radius:5px;
  width:100%; margin-top:10px;
}
.cart {
  position:fixed; top:10px; right:10px;
  background:#000; color:#fff; padding:10px;
  border-radius:5px;
}
.call {
  position:fixed; bottom:10px; left:10px;
  background:#007bff; color:white; padding:15px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>
<h1>TNY STORE</h1>
</header>

<div class="cart" onclick="openCart()">
🛒 Количка (<span id="count">0</span>)
</div>

<div class="container">

<div class="product">
<h2>Пясъчник</h2>

<select id="size">
<option value="57">Малък - 57€</option>
<option value="67">Среден - 67€</option>
<option value="83">Голям - 83€</option>
</select>

<select id="color">
<option>Натурален</option>
<option>Кафяв</option>
<option>Зелен</option>
</select>

<button onclick="addSandbox()">Добави в количка</button>
</div>

<div class="product">
<h2>Пясъчник със сенник - 113€</h2>
<button onclick="addCanopy()">Добави в количка</button>
</div>

<div class="product">
<h2>Детски съоръжения</h2>
<button onclick="custom()">Запитване</button>
</div>

</div>

<a class="call" href="tel:0879446665">📞</a>

<script>
let cart = [];

function updateCart(){
  document.getElementById("count").innerText = cart.length;
}

function addSandbox(){
  let size = document.getElementById("size");
  let color = document.getElementById("color");

  cart.push({
    name: "Пясъчник",
    size: size.options[size.selectedIndex].text,
    color: color.value
  });

  updateCart();
}

function addCanopy(){
  cart.push({name: "Пясъчник със сенник - 113€"});
  updateCart();
}

function openCart(){
  if(cart.length === 0){
    alert("Количката е празна");
    return;
  }

  let text = "Здравейте, искам да поръчам:\n\n";

  cart.forEach(p=>{
    text += p.name + "\n";
    if(p.size) text += p.size + "\n";
    if(p.color) text += "Цвят: " + p.color + "\n";
    text += "\n";
  });

  window.open("https://wa.me/359879446665?text=" + encodeURIComponent(text));
}

function custom(){
  window.open("https://wa.me/359879446665?text=Интересувам се от детско съоръжение");
}
</script>

</body>
</html>
