<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNY STORE</title>

<style>
body {font-family:Arial;margin:0;background:#f5f5f5;}
header {background:#111;color:#fff;padding:15px;text-align:center;}
.container {padding:15px;}
.product {background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
button {background:#25D366;color:#fff;border:none;padding:10px;border-radius:5px;width:100%;margin-top:10px;}
.cart {position:fixed;top:10px;right:10px;background:#000;color:#fff;padding:10px;border-radius:5px;}
.call {position:fixed;bottom:10px;left:10px;background:#007bff;color:white;padding:15px;border-radius:50%;}
.gallery {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gallery img {width:100%;border-radius:10px;}
input, select {width:100%;padding:10px;margin-top:5px;margin-bottom:10px;}
</style>
</head>

<body>

<header>
<h1>TNY STORE</h1>
<p>Детски съоръжения и дървени изделия</p>
</header>

<div class="cart" onclick="openCart()">🛒 (<span id="count">0</span>)</div>

<div class="container">

<h2>🪵 Пясъчници</h2>
<div class="product">
<select id="size">
<option value="57">Малък - 57€</option>
<option value="67">Среден - 67€</option>
<option value="83">Голям - 83€</option>
</select>

<select id="color">
<option>Натурален</option>
<option>Кафяв</option>
<option>Зелен</option>
</select>

<button onclick="addSandbox()">Добави в количка</button>
</div>

<div class="product">
<h3>Пясъчник със сенник - 113€</h3>
<button onclick="addCanopy()">Добави в количка</button>
</div>

<h2>🛝 Детски съоръжения</h2>
<div class="product">
<button onclick="custom()">Запитване</button>
</div>

<h2>💡 LED Крушки</h2>
<div class="product">
<button onclick="addLED()">Добави в количка</button>
</div>

<h2>💅 Маникюр комплект</h2>
<div class="product">
<button onclick="addNails()">Добави в количка</button>
</div>

<h2>🖼️ Галерия</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<img src="https://images.unsplash.com/photo-1598300053653-02d4c7a2c63e">
<img src="https://images.unsplash.com/photo-1616628182504-6c3d2b9c1f94">
<img src="https://images.unsplash.com/photo-1600607687644-c7f34c1f2a5f">
</div>

<h2>📦 Поръчка</h2>
<input id="name" placeholder="Име">
<input id="phone" placeholder="Телефон">
<input id="city" placeholder="Град / Еконт офис">

<button onclick="orderNow()">Поръчай</button>

</div>

<a class="call" href="tel:0879446665">📞</a>

<script>
let cart=[];

function update(){document.getElementById("count").innerText=cart.length;}

function addSandbox(){
let size=document.getElementById("size").value;
let color=document.getElementById("color").value;
cart.push("Пясъчник "+size+"€ Цвят:"+color);
update();
}

function addCanopy(){cart.push("Пясъчник със сенник 113€");update();}
function addLED(){cart.push("LED Крушка");update();}
function addNails(){cart.push("Маникюр комплект");update();}
function custom(){window.open("https://wa.me/359879446665?text=Интересувам се от съоръжение");}

function openCart(){
if(cart.length==0){alert("Количката е празна");return;}
alert(cart.join("\n"));
}

function orderNow(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let city=document.getElementById("city").value;

let text="Поръчка:%0A"+cart.join("%0A")+
"%0AИме:"+name+
"%0AТел:"+phone+
"%0AАдрес:"+city;

window.open("https://wa.me/359879446665?text="+text);
}
</script>

</body>
</html>
